from pathlib import Path
import gi
gi.require_version('Gst', '1.0')
from gi.repository import Gst, GLib
import os
import numpy as np
import cv2
import hailo

from hailo_apps.hailo_app_python.core.common.buffer_utils import get_caps_from_>
from hailo_apps.hailo_app_python.core.gstreamer.gstreamer_app import app_callba>
from hailo_apps.hailo_app_python.apps.detection.detection_pipeline import GStre>

# ----------------------------------------------------------------------------->
# User-defined class to be used in the callback function
# ----------------------------------------------------------------------------->
# Inheritance from the app_callback_class
class user_app_callback_class(app_callback_class):
    def __init__(self):
        super().__init__()
        self.new_variable = 42  # New variable example

    def new_function(self):  # New function example
        return "The meaning of life is: "

# ----------------------------------------------------------------------------->
# User-defined callback function
# ----------------------------------------------------------------------------->
def app_callback(pad, info, user_data):
    buffer = info.get_buffer()
    if buffer is None:
        return Gst.PadProbeReturn.OK

    user_data.increment()
    string_to_print = f"Frame count: {user_data.get_count()}\n"

    roi = hailo.get_roi_from_buffer(buffer)
    detections = roi.get_objects_typed(hailo.HAILO_DETECTION)

    string_to_print += f"Total detections: {len(detections)}\n"

    for detection in detections:
        label = detection.get_label()
        bbox = detection.get_bbox()
        confidence = detection.get_confidence()
        string_to_print += (
            f"Detection: {label}, conf={confidence:.2f}, "
            f"bbox=({bbox.xmin():.3f},{bbox.ymin():.3f},{b,{bbox.width():.3f}bbox.height():.3f})\n"
        )

    print(string_to_print)
    return Gst.PadProbeReturn.OK

if __name__ == "__main__":
    project_root = Path(__file__).resolve().parent.parent
    env_file     = project_root / ".env"
    env_path_str = str(env_file)
    os.environ["HAILO_ENV_FILE"] = env_path_str
    # Create an instance of the user app callback class
    user_data = user_app_callback_class()
    app = GStreamerDetectionApp(app_callback, user_data)
    app.run()







